<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رفع صورة - الشتلة الرقمية</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar">
  <div class="container flex justify-between items-center">
    <a href="index.html" class="logo flex items-center gap-10" style="display:flex;align-items:center;gap:10px">
      <img src="logo.jpg" alt="شعار" style="width:40px;height:40px;border-radius:50%;object-fit:cover" onerror="this.style.display='none'">
      <span>منظمة نبض الأرض</span>
    </a>
    <div class="nav-links flex gap-20 items-center">
      <span class="user-name hidden" id="userName"></span>
      <a href="dashboard.html" class="auth-link dashboard-link hidden">لوحة التحكم</a>
      <a href="admin.html" class="auth-link admin-link hidden">لوحة المشرف</a>
      <a href="login.html" class="guest-link">تسجيل الدخول</a>
      <a href="register.html" class="btn btn-primary guest-link">حساب جديد</a>
      <a href="#" class="auth-link hidden" id="logoutLink">تسجيل الخروج</a>
    </div>
  </div>
</nav>

<div class="container" dir="rtl">
  <div class="flex justify-center">
    <div class="card" style="width:100%;max-width:600px">
      <h2>📸 رفع صورة للنبتة</h2>
      <p style="margin-bottom:2rem;color:var(--text-light)">قم برفع صورة واضحة لنبتتك واكتب ملاحظة تصف حالتها.</p>

      <div id="uploadError" class="error-msg hidden"></div>

      <form id="uploadForm">
        <div class="flex flex-col gap-20">
          <div style="border:2px dashed #ddd;padding:2rem;text-align:center;border-radius:var(--border-radius);cursor:pointer;position:relative" id="dropZone">
            <div id="preview">
              <p style="font-size:3rem">📁</p>
              <p>اضغط هنا أو اسحب الصورة لرفعها</p>
            </div>
            <input type="file" id="fileInput" accept="image/*" required style="position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer">
          </div>

          <div>
            <label>كتابة الملاحظة</label>
            <textarea id="uploadDesc" class="input-field" rows="4" required placeholder="اكتب ملاحظتك هنا (مثال: النبتة تنمو بشكل جيد...)"></textarea>
          </div>

          <div class="flex gap-10">
            <button type="submit" class="btn btn-primary" style="flex:1">تأكيد الرفع</button>
            <a href="dashboard.html" class="btn btn-secondary" style="flex:1;display:block">إلغاء</a>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body>
</html>
