<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول - منظمة نبض الأرض</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar">
  <div class="container flex justify-between items-center">
    <a href="index.html" class="logo">منظمة نبض الأرض</a>
    <div class="nav-links flex gap-20 items-center">
      <a href="login.html">تسجيل الدخول</a>
      <a href="register.html" class="btn btn-primary">حساب جديد</a>
    </div>
  </div>
</nav>

<div class="container flex justify-center items-center" style="min-height:80vh">
  <div class="card" style="width:100%;max-width:400px" dir="rtl">
    <h2 style="text-align:center">تسجيل الدخول</h2>

    <div id="loginSuccess" class="success-msg hidden">تم التسجيل بنجاح! يمكنك الآن تسجيل الدخول.</div>
    <div id="loginError" class="error-msg hidden"></div>

    <form id="loginForm">
      <div class="gap-20 flex flex-col">
        <div>
          <label>البريد الإلكتروني</label>
          <input type="email" id="loginEmail" class="input-field" required placeholder="example@mail.com">
        </div>
        <div>
          <label>كلمة المرور</label>
          <input type="password" id="loginPassword" class="input-field" required placeholder="********">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:1rem">دخول</button>
      </div>
    </form>

    <div style="margin-top:1.5rem;text-align:center">
      <span>ليس لديك حساب؟ </span>
      <a href="register.html" style="color:var(--primary-green);font-weight:bold">أنشئ حساباً جديداً</a>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body>
</html>
